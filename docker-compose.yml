services:
  satisfactory-server:
    image: 'satisfactory-arm64'
    container_name: 'satisfactory-server'
    ports:
      - '7777:7777/udp'
      - '7777:7777/tcp'
      - '${RELIABLE_PORT:-8888}:${RELIABLE_PORT:-8888}/tcp'
    restart: 'unless-stopped'
    environment:
      - EXTRA_PARAMS=-log -unattended -ReliablePort=${RELIABLE_PORT:-8888} -ini:Engine:[HTTPServer.Listeners]:DefaultBindAddress=any
      - ALWAYS_UPDATE_ON_START=true
    volumes:
      - '${GAMEDIR:?GAMEDIR muss in .env gesetzt sein - siehe SETUP-MAC.md}/serverfiles:/satisfactory'
      - '${GAMEDIR}/config:/home/steam/.config/Epic'
      - ./init-server.sh:/home/steam/init-server.sh:rw
    stdin_open: true
    tty: true
    entrypoint: /home/steam/init-server.sh